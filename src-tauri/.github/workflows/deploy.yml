Based on the exploration, the givinity server is a Node.js app deployed with pm2. Here's the workflow:

name: Deploy Givinity
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to production server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/givinity
            git fetch origin main
            git reset --hard origin/main
            npm install --production
            npm run build
            pm2 restart givinity || pm2 start npm --name "givinity" -- start